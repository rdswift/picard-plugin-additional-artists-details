"manifest.description" = "Ce plugin fournit des variables spécifiques aux albums et aux morceaux, ainsi que des informations sur les artistes, destinées à être utilisées dans les scripts de balisage et de nommage."
"manifest.long_description" = "Ce plugin fournit des variables spécialisées pour les albums et les pistes, ainsi que des informations sur les artistes, destinées à être utilisées dans les scripts de balisage et de nommage. Notez que cela génère\ndes appels supplémentaires à l'API MusicBrainz pour obtenir les informations sur les artistes et la région, ce qui ralentit le traitement. Ce ralentissement sera particulièrement\nperceptible lorsqu'il y a de nombreux artistes différents pour les albums ou les pistes, comme c'est le cas sur un album [Various Artists]. Une option permet de désactiver le traitement des\nartistes de pistes, ce qui peut augmenter considérablement la vitesse de traitement si vous ne vous intéressez qu'aux informations sur l'artiste de l'album.\n"
"manifest.name" = "Informations supplémentaires sur les artistes"
"qt.AdditionalArtistsDetailsOptionsPage.option.include.county" = "Indiquer le comté"
"qt.AdditionalArtistsDetailsOptionsPage.option.include.municipality" = "Indiquer la commune"
"qt.AdditionalArtistsDetailsOptionsPage.option.include.subdivision" = "Inclure la subdivision géographique"
"qt.AdditionalArtistsDetailsOptionsPage.option.process.tracks" = "Exécuter artistes de la piste"
"qt.AdditionalArtistsDetailsOptionsPage.page.description" = "Ces paramètres déterminent le fonctionnement du plugin **Informations supplémentaires sur les artistes**."
"qt.AdditionalArtistsDetailsOptionsPage.page.title" = "Informations supplémentaires sur les artistes"
"qt.AdditionalArtistsDetailsOptionsPage.section.include.text" = "Cette option permet de déterminer si les informations relatives au comté, à la commune et à la subdivision doivent être incluses dans les variables de localisation de l'artiste créées. Quels que soient ces paramètres, ces informations seront incluses si un comté, une commune ou une subdivision est la zone spécifiée pour un artiste."
"qt.AdditionalArtistsDetailsOptionsPage.section.include.title" = "Ajouter les détails du quartier"
"qt.AdditionalArtistsDetailsOptionsPage.section.process.text" = "Cette option permet de déterminer si les informations détaillées sont récupérées pour tous les interprètes des titres de l'album. Si vous ne souhaitez obtenir que les informations relatives aux interprètes de l'album, cette option doit être désactivée, ce qui réduira considérablement le nombre d'appels supplémentaires vers l'API MusicBrainz et le temps nécessaire au chargement de l'album. Les interprètes de l'album sont toujours traités."
"qt.AdditionalArtistsDetailsOptionsPage.section.process.title" = "Exécuter artistes du morceau"
"qt.AdditionalArtistsDetailsOptionsPage.window.title" = "Options supplémentaires concernant les artistes"
"ui.title" = "Informations supplémentaires sur les artistes"

